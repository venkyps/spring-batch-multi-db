# Main datasource properties (Batch Metadata tables will use this)
spring.datasource.url=jdbc:postgresql://localhost:5432/batch_demo?currentSchema=target_schema
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Initialization for Batch metadata tables (will create if they don't exist)
spring.sql.init.schema-locations=classpath:org/springframework/batch/core/schema-postgresql.sql,classpath:schema-source.sql,classpath:schema-target.sql
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.batch.jdbc.initialize-schema=always

# Custom DataSource configurations for multi-schema
app.datasource.source.schema=classpath:schema-source.sql
app.datasource.source.jdbc-url=jdbc:postgresql://localhost:5432/batch_demo?currentSchema=source_schema
app.datasource.source.username=postgres
app.datasource.source.password=password
app.datasource.source.driver-class-name=org.postgresql.Driver
app.datasource.source.maximum-pool-size=5

app.datasource.target.schema=classpath:schema-target.sql
app.datasource.target.jdbc-url=jdbc:postgresql://localhost:5432/batch_demo?currentSchema=target_schema
app.datasource.target.username=postgres
app.datasource.target.password=password
app.datasource.target.driver-class-name=org.postgresql.Driver
app.datasource.target.maximum-pool-size=5

logging.level.org.springframework.batch=DEBUG
logging.level.com.example.batch=DEBUG